name: Build Optimized APK (arm64-v8a)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub web interface

jobs:
  build:
    name: Build & Optimize APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Optimized Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find and Rename Optimized APK
        run: |
          mkdir -p build-artifacts
          # Locate the built APK and copy it to a descriptive name
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} build-artifacts/Mahfazti-arm64-v8a.apk \;
          echo "APK successfully optimized and extracted."

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mahfazti-arm64-v8a-APK
          path: build-artifacts/Mahfazti-arm64-v8a.apk
          retention-days: 7
