name: Build Optimized APK (arm64-v8a)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub web interface

jobs:
  build:
    name: Build & Optimize APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Decoded debug.keystore successfully from debug.keystore.base64."
          else
            echo "debug.keystore.base64 not found. Generating a temporary debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Optimized Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Find and Rename Optimized APK
        run: |
          mkdir -p build-artifacts
          # Locate the built APK and copy it to a descriptive name
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} build-artifacts/Mahfazti-arm64-v8a.apk \;
          echo "APK successfully optimized and extracted."

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mahfazti-arm64-v8a-APK
          path: build-artifacts/Mahfazti-arm64-v8a.apk
          retention-days: 7
